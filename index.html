<!DOCTYPE html>
<html>
<head>
    <title>AI Text Detector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            padding-top: 60px;
        }

        .container {
            background: white;
            padding: 20px;
            width: 400px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 8px;
            resize: none;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            background: #222;
            color: white;
            cursor: pointer;
            position: relative;
        }

        button:hover {
            background: #444;
        }

        /* spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-left: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result {
            margin-top: 15px;
            font-size: 14px;
        }

        .label {
            font-weight: bold;
        }

        .ai {
            color: red;
        }

        .human {
            color: green;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Text Detector</h2>

    <textarea id="inputText" placeholder="Paste your text here..."></textarea>
    <button id="analyzeBtn" onclick="detectText()">
        <span id="btnText">Analyze</span>
        <span id="spinner" class="spinner" style="display:none;"></span>
    </button>

    <div class="result" id="result"></div>
</div>

<script>
async function detectText() {
    const text = document.getElementById("inputText").value;
    const resultDiv = document.getElementById("result");
    const btn = document.getElementById("analyzeBtn");
    const spinner = document.getElementById("spinner");

    if (!text.trim()) {
        resultDiv.innerHTML = "Please enter some text.";
        return;
    }

    // show loading state
    btn.disabled = true;
    spinner.style.display = "inline-block";

    const url = "https://brooke-granitic-stodgily.ngrok-free.dev/predict"; // Replace with your backend URL
    try {
        const response = await fetch(url, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ text: text }) // Adjust if backend expects different format
        });

        const data = await response.json();

        const predictionClass = data.final_prediction === "Human-written" ? "human" : "ai";

        resultDiv.innerHTML = `
            <p class="label">Final Prediction:
                <span class="${predictionClass}">${data.final_prediction}</span>
            </p>
            <p><span class="label">Final Probability:</span>
                ${data.final_probability.toFixed(4)}
            </p>
            <p><span class="label">Confidence:</span>
                ${data.confidence.toFixed(4)}
            </p>
            <hr>
            <p class="label">Stream Probabilities:</p>
            <p>Semantic: ${data.stream_probabilities.fairda_semantic.toFixed(4)}</p>
            <p>Syntax: ${data.stream_probabilities.syntax.toFixed(4)}</p>
            <p>Retrieval: ${data.stream_probabilities.retrieval.toFixed(4)}</p>
        `;
    } catch (error) {
        console.error(error);
        resultDiv.innerHTML = "Error connecting to backend.";
    } finally {
        // hide loading state
        btn.disabled = false;
        spinner.style.display = "none";
    }
}
</script>

</body>
</html>
